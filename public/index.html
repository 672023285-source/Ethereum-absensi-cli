<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Absensi Ethereum</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container mt-5 mb-5">
    <div class="card shadow-lg">

      <!-- HEADER -->
      <div class="card-header bg-primary text-white text-center py-4">
        <h1>⛓️ Sistem Absensi Ethereum</h1>
        <p>Berbasis Smart Contract Ethereum</p>
        <span class="badge bg-success">Ethereum Connected</span>
      </div>

      <div class="card-body">
        
        <!-- FORM ABSENSI -->
        <h4>📝 Input Absensi</h4>
        <hr>

        <label class="form-label">Nama Mahasiswa</label>
        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama mahasiswa">
        <br>

        <div class="d-flex gap-3">
          <button onclick="hadir()" class="btn btn-success px-5">✔ Hadir</button>
          <button onclick="izin()" class="btn btn-warning px-5">⚠ Izin</button>
        </div>

        <hr>

        <!-- STATISTIK -->
        <h4>📊 Statistik Absensi</h4>

        <div class="row text-center mt-3">
          <div class="col-md-6">
            <div class="card bg-light">
              <div class="card-body">
                <h2 id="jumlah">0</h2>
                <p>Total Absensi</p>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card bg-light">
              <div class="card-body">
                <h2>🔒</h2>
                <p>Data Tersimpan Blockchain</p>
              </div>
            </div>
          </div>
        </div>

        <hr>

        <!-- DATA TERAKHIR -->
        <h4>📚 Data Absensi</h4>
        <button onclick="lihatTerakhir()" class="btn btn-info">🔍 Lihat Data</button>
        <br><br>

        <div id="hasil" class="alert alert-secondary">
          Belum ada data.
        </div>

        <hr>

        <!-- RIWAYAT SEMUA ABSENSI -->
        <h4>📋 Riwayat Semua Absensi</h4>
        <button onclick="lihatSemua()" class="btn btn-secondary">📂 Tampilkan Semua Data</button>
        <br><br>

        <div id="riwayat" class="table-responsive">
          <p class="text-muted">Belum ada data ditampilkan.</p>
        </div>

      </div>
      <!-- /card-body -->

    </div>
    <!-- /card -->
  </div>
  <!-- /container -->

  <script src="script.js"></script>
</body>
</html>
